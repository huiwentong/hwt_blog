services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hwt-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - /mnt/z/github/db:/mnt/z/github/db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hwt-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - /mnt/m:/media/music:ro
      - /mnt/f:/media/movies:ro
      - /mnt/p:/media/pictures:ro
    depends_on:
      backend:
        condition: service_healthy

