server {
    listen 80;
    server_name _;

    # Redirect to HTTPS when accessed via public domain
    if (System.Management.Automation.Internal.Host.InternalHost !~ ^(localhost|192\.168\..*|10\..*|172\.1[6-9]\..*|172\.2[0-9]\..*|172\.3[0-1]\..*|127\..*)$) {
        return 301 https://System.Management.Automation.Internal.Host.InternalHost;
    }

    root /usr/share/nginx/html;
    index index.html;

    sendfile on;
    tcp_nopush on;
    charset utf-8;

    # Never cache index.html so new builds are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Music files
    location /music/ {
        alias /media/music/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    # Movies files
    location /movies/ {
        alias /media/movies/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    # Pictures files
    location /pictures/ {
        alias /media/pictures/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host System.Management.Automation.Internal.Host.InternalHost;
        proxy_set_header X-Real-IP ;
        proxy_set_header X-Forwarded-For ;
        proxy_set_header X-Forwarded-Proto ;
    }

    location / {
        try_files  /index.html;
    }
}

server {
    listen 443 ssl;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    sendfile on;
    tcp_nopush on;
    charset utf-8;

    # Never cache index.html so new builds are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Music files
    location /music/ {
        alias /media/music/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    # Movies files
    location /movies/ {
        alias /media/movies/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    # Pictures files
    location /pictures/ {
        alias /media/pictures/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host System.Management.Automation.Internal.Host.InternalHost;
        proxy_set_header X-Real-IP ;
        proxy_set_header X-Forwarded-For ;
        proxy_set_header X-Forwarded-Proto ;
    }

    location / {
        try_files  /index.html;
    }
}
