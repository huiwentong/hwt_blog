server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    sendfile on;
    tcp_nopush on;

    # Music files
    location /music/ {
        alias /media/music/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    # Movies files
    location /movies/ {
        alias /media/movies/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    # Pictures files
    location /pictures/ {
        alias /media/pictures/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        try_files $uri /index.html;
    }
}
